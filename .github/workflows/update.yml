name: Update MAST Calendar

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  update-calendar:

    runs-on: ubuntu-latest

    steps:

      - name: Check out repository
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Generate calendar
        env:
          MAST_LICENSE_KEY: ${{ secrets.MAST_LICENSE_KEY }}
        run: |
          python generate.py


      - name: Save updated calendar
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add mast.ics

          git commit -m "Update MAST calendar" || exit 0

          git push